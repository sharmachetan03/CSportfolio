<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="avatar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
        <linearGradient id="neon-ring" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00B4D8" />
            <stop offset="50%" stop-color="#64ffda" />
            <stop offset="100%" stop-color="#0077b6" />
        </linearGradient>
        <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00B4D8" />
            <stop offset="100%" stop-color="#64ffda" />
        </linearGradient>
    </defs>
    
    <!-- Outer Ring -->
    <circle cx="100" cy="100" r="95" fill="none" stroke="url(#neon-ring)" stroke-width="3" />
    
    <!-- Background Circle -->
    <circle cx="100" cy="100" r="90" fill="url(#avatar-bg)" />
    
    <!-- Subtle Technology Hex Grid inside Avatar -->
    <g opacity="0.15" stroke="#64ffda" stroke-width="0.5" fill="none">
        <polygon points="100,50 115,58 115,75 100,83 85,75 85,58" />
        <polygon points="130,68 145,76 145,93 130,101 115,93 115,76" />
        <polygon points="70,68 85,76 85,93 70,101 55,93 55,76" />
        <polygon points="100,86 115,94 115,111 100,119 85,111 85,94" />
    </g>
    
    <!-- Architect Illustration -->
    <g transform="translate(0, 5)">
        <!-- Head and Neck -->
        <path d="M 85,120 L 85,135 Q 100,140 115,135 L 115,120 Z" fill="#e2e8f0" opacity="0.9" />
        <circle cx="100" cy="85" r="32" fill="#e2e8f0" />
        
        <!-- Hair / Beard (Professional & Neat style) -->
        <path d="M 68,85 C 68,52 132,52 132,85 C 132,70 120,60 100,60 C 80,60 68,70 68,85 Z" fill="#0f172a" />
        <path d="M 68,85 Q 73,115 100,122 Q 127,115 132,85 C 128,105 120,115 100,115 C 80,115 72,105 68,85 Z" fill="#0f172a" opacity="0.95" /> <!-- Beard -->
        
        <!-- Modern Glasses (Smart Architect Aesthetic) -->
        <g stroke="#0f172a" stroke-width="2.5" fill="none">
            <rect x="75" y="80" width="18" height="12" rx="3" fill="rgba(0, 180, 216, 0.15)" stroke="url(#accent-grad)" />
            <rect x="107" y="80" width="18" height="12" rx="3" fill="rgba(0, 180, 216, 0.15)" stroke="url(#accent-grad)" />
            <line x1="93" y1="85" x2="107" y2="85" stroke="url(#accent-grad)" />
            <line x1="75" y1="83" x2="69" y2="83" />
            <line x1="125" y1="83" x2="131" y2="83" />
        </g>
        
        <!-- Suit Collar and Tie (Corporate Theme) -->
        <path d="M 55,145 L 145,145 L 135,185 L 65,185 Z" fill="#1e293b" /> <!-- Suit jacket -->
        <path d="M 85,145 L 100,175 L 115,145 Z" fill="#f8fafc" /> <!-- White Shirt -->
        <path d="M 97,148 L 103,148 L 106,170 L 100,180 L 94,170 Z" fill="url(#accent-grad)" /> <!-- Blue Tie -->
    </g>
    
    <!-- Overlaid Telemetry Node on bottom-right -->
    <g transform="translate(135, 135)" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.5))">
        <circle cx="20" cy="20" r="18" fill="#0f172a" stroke="#64ffda" stroke-width="2" />
        <!-- Miniature monitoring gauge / chart -->
        <path d="M 10,25 L 15,15 L 20,22 L 25,10 L 30,22" fill="none" stroke="#64ffda" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>
</svg>
