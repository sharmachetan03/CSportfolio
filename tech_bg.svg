<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <defs>
        <!-- Background Gradients -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050811" />
            <stop offset="50%" stop-color="#0a1226" />
            <stop offset="100%" stop-color="#040712" />
        </linearGradient>
        
        <!-- Grid Pattern -->
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0, 180, 216, 0.03)" stroke-width="1" />
            <circle cx="0" cy="0" r="1.5" fill="rgba(0, 180, 216, 0.15)" />
        </pattern>
        
        <!-- Glow Filters -->
        <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Main Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" />

    <!-- Grid Overlay -->
    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- Abstract Network Elements (Monitoring Theme) -->
    <g opacity="0.65">
        <!-- Huge Ambient Glowing Orbs -->
        <circle cx="150" cy="200" r="250" fill="rgba(0, 180, 216, 0.03)" filter="url(#glow-blue)" />
        <circle cx="1200" cy="700" r="300" fill="rgba(100, 255, 218, 0.02)" filter="url(#glow-blue)" />
        
        <!-- Connection Lines / Data Nodes -->
        <path d="M -100,450 L 300,450 L 450,300 L 800,300 L 950,450 L 1600,450" fill="none" stroke="rgba(0, 180, 216, 0.08)" stroke-width="2" />
        <path d="M 250,150 L 500,400 L 750,150 L 1050,450" fill="none" stroke="rgba(100, 255, 218, 0.05)" stroke-width="1.5" stroke-dasharray="10 5" />
        <path d="M 450,300 L 450,600 L 600,750 M 800,300 L 800,100" fill="none" stroke="rgba(0, 180, 216, 0.06)" stroke-width="1.5" />
        
        <!-- Active Glowing Nodes -->
        <circle cx="300" cy="450" r="4" fill="#00B4D8" filter="url(#glow-cyan)" />
        <circle cx="450" cy="300" r="5" fill="#64ffda" filter="url(#glow-cyan)" />
        <circle cx="800" cy="300" r="5" fill="#00B4D8" filter="url(#glow-cyan)" />
        <circle cx="950" cy="450" r="4" fill="#64ffda" filter="url(#glow-cyan)" />
        <circle cx="500" cy="400" r="3" fill="#64ffda" />
        <circle cx="750" cy="150" r="3" fill="#00B4D8" />
        <circle cx="450" cy="600" r="4" fill="#00B4D8" />

        <!-- Data flow telemetry boxes -->
        <rect x="270" y="470" width="60" height="24" rx="3" fill="rgba(0, 180, 216, 0.05)" stroke="rgba(0, 180, 216, 0.2)" stroke-width="1" />
        <text x="300" y="485" font-family="monospace" font-size="9" fill="rgba(0, 180, 216, 0.6)" text-anchor="middle">SYS.OK</text>

        <rect x="770" y="60" width="60" height="24" rx="3" fill="rgba(100, 255, 218, 0.03)" stroke="rgba(100, 255, 218, 0.15)" stroke-width="1" />
        <text x="800" y="75" font-family="monospace" font-size="9" fill="rgba(100, 255, 218, 0.5)" text-anchor="middle">SLA:100%</text>
    </g>
</svg>
